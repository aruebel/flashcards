<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f3a"/>
      <stop offset="100%" style="stop-color:#0f1629"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3a6b"/>
      <stop offset="100%" style="stop-color:#1e2850"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3d52a0"/>
      <stop offset="100%" style="stop-color:#2a3a7a"/>
    </linearGradient>
    <linearGradient id="cardTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#e8ecf8"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f8ef7"/>
      <stop offset="100%" style="stop-color:#3b6fd4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="shadowSoft" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <clipPath id="roundedSquare">
      <rect width="512" height="512" rx="112" ry="112"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g clip-path="url(#roundedSquare)" opacity="0.04">
    <line x1="0" y1="64" x2="512" y2="64" stroke="white" stroke-width="1"/>
    <line x1="0" y1="128" x2="512" y2="128" stroke="white" stroke-width="1"/>
    <line x1="0" y1="192" x2="512" y2="192" stroke="white" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="white" stroke-width="1"/>
    <line x1="0" y1="320" x2="512" y2="320" stroke="white" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="white" stroke-width="1"/>
    <line x1="0" y1="448" x2="512" y2="448" stroke="white" stroke-width="1"/>
    <line x1="64" y1="0" x2="64" y2="512" stroke="white" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="white" stroke-width="1"/>
    <line x1="192" y1="0" x2="192" y2="512" stroke="white" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="white" stroke-width="1"/>
    <line x1="320" y1="0" x2="320" y2="512" stroke="white" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="white" stroke-width="1"/>
    <line x1="448" y1="0" x2="448" y2="512" stroke="white" stroke-width="1"/>
  </g>

  <!-- Back card (rotated -8deg, offset) -->
  <g filter="url(#shadow)" transform="translate(256,268) rotate(-8) translate(-110,-80)">
    <rect width="220" height="160" rx="18" ry="18" fill="url(#card1)"/>
    <line x1="24" y1="52" x2="196" y2="52" stroke="#4f5fa0" stroke-width="2" opacity="0.5"/>
    <rect x="24" y="68" width="120" height="10" rx="5" fill="#4f5fa0" opacity="0.4"/>
    <rect x="24" y="86" width="80" height="10" rx="5" fill="#4f5fa0" opacity="0.3"/>
  </g>

  <!-- Middle card (rotated 5deg) -->
  <g filter="url(#shadow)" transform="translate(256,258) rotate(5) translate(-110,-80)">
    <rect width="220" height="160" rx="18" ry="18" fill="url(#card2)"/>
    <line x1="24" y1="52" x2="196" y2="52" stroke="#6b80c8" stroke-width="2" opacity="0.5"/>
    <rect x="24" y="68" width="140" height="10" rx="5" fill="#6b80c8" opacity="0.4"/>
    <rect x="24" y="86" width="90" height="10" rx="5" fill="#6b80c8" opacity="0.3"/>
  </g>

  <!-- Front card (white, straight) -->
  <g filter="url(#shadowSoft)" transform="translate(146,158)">
    <rect width="220" height="160" rx="18" ry="18" fill="url(#cardTop)"/>

    <!-- Card header bar -->
    <rect width="220" height="44" rx="18" ry="18" fill="url(#accent)"/>
    <rect y="26" width="220" height="18" fill="url(#accent)"/>

    <!-- Question mark on header -->
    <text x="110" y="30" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">?</text>

    <!-- Lines representing text -->
    <rect x="20" y="60" width="130" height="9" rx="4.5" fill="#c8cfe8"/>
    <rect x="20" y="76" width="100" height="9" rx="4.5" fill="#d8ddf0"/>
    <rect x="20" y="92" width="115" height="9" rx="4.5" fill="#d8ddf0"/>

    <!-- Checkmark circle at bottom right -->
    <circle cx="178" cy="128" r="20" fill="url(#accent)"/>
    <polyline points="168,128 175,136 190,118" stroke="white" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Glow dots decoration -->
  <circle cx="420" cy="100" r="5" fill="#4f8ef7" opacity="0.5"/>
  <circle cx="440" cy="80" r="3" fill="#4f8ef7" opacity="0.3"/>
  <circle cx="90" cy="400" r="4" fill="#4f8ef7" opacity="0.4"/>
  <circle cx="70" cy="420" r="2.5" fill="#4f8ef7" opacity="0.25"/>
</svg>
